<style>
    @keyframes flotar-suave { 0% { transform: translateY(0) translateX(0) scale(1); } 33% { transform: translateY(-15px) translateX(10px) scale(1.02); } 66% { transform: translateY(10px) translateX(-10px) scale(0.98); } 100% { transform: translateY(0) translateX(0) scale(1); } }
    .burbuja-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%); box-shadow: inset -15px -15px 30px rgba(0, 0, 0, 0.15), inset 15px 15px 30px rgba(255, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
    .burbuja-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation: flotar-suave 8s infinite ease-in-out; }
    .burbuja-2 { width: 200px; height: 200px; bottom: -50px; right: 150px; animation: flotar-suave 12s infinite ease-in-out reverse; }
    .burbuja-3 { width: 150px; height: 150px; top: 50px; left: 15%; animation: flotar-suave 10s infinite ease-in-out 1s; }
    
    .page-link { color: #10B981; border: none; border-radius: 8px; margin: 0 3px; font-weight: bold; transition: all 0.2s; }
    .page-item.active .page-link { background-color: #10B981; color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
    .page-link:hover:not(.active) { background-color: rgba(16, 185, 129, 0.1); color: #10B981; }
</style>

<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white shadow-sm" style="background: linear-gradient(135deg, #10B981 0%, #047857 100%); border-radius: 24px; position: relative; overflow: hidden;">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>

            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white text-success mb-3 px-3 py-2 shadow-sm fw-bold" style="letter-spacing: 1px; font-size: 0.85rem;"><i class="bi bi-shield-lock me-1"></i> SEGURIDAD Y ACCESOS</span>
                    <h1 class="fw-bolder mb-2 text-white" style="font-size: 2.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Gestión de Usuarios</h1>
                    <p class="mb-0 fw-bold fs-5" style="color: rgba(255,255,255,0.9);">Administración de cuentas, roles y restablecimiento de claves.</p>
                </div>
                <div class="col-md-3 text-center text-md-end d-none d-md-block">
                    <img src="assets/img/logo.png" alt="Logo Escuela" style="max-height: 130px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 h-100" style="border-top: 5px solid #10B981 !important;">
            <div class="card-header bg-white border-bottom p-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-people-fill text-success me-2"></i>Directorio de Usuarios</h5>
                    <small class="text-muted">Busque, edite o elimine accesos al sistema.</small>
                </div>
                
                <div class="d-flex gap-2 flex-wrap">
                    <input type="text" id="buscador-usuarios" class="input-moderno form-control-sm border-success" placeholder="Buscar cédula o nombre..." style="width: 250px;" onkeyup="window.ModUsuarios.filtrar()">
                    
                    <button class="btn btn-dark fw-bold shadow-sm px-3 rounded-pill hover-efecto" onclick="window.ModUsuarios.cargaMasiva()">
                        <i class="bi bi-cloud-arrow-up-fill me-1"></i>Carga Masiva
                    </button>
                    
                    <button class="btn btn-success fw-bold shadow-sm px-3 rounded-pill hover-efecto" onclick="window.ModUsuarios.nuevoUsuario()">
                        <i class="bi bi-person-plus-fill me-1"></i>Nuevo
                    </button>
                </div>
            </div>
            
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted small">
                            <tr>
                                <th class="ps-4">Cédula</th>
                                <th>Nombre Completo</th>
                                <th>Rol en Sistema</th>
                                <th>Cargo</th>
                                <th>Estado</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios"></tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white border-top p-3 d-flex justify-content-center rounded-bottom-4">
                <nav><ul class="pagination mb-0" id="paginacion-usuarios"></ul></nav>
            </div>
        </div>
    </div>
</div>
