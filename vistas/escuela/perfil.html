<style>
    .tarjeta-btn { background: white; border-radius: 16px; border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
    .tarjeta-btn:hover { transform: translateY(-8px); border-bottom-color: #6d28d9; box-shadow: 0 15px 35px rgba(109, 40, 217, 0.15) !important; }
    .tarjeta-btn.bloqueado { opacity: 0.6; filter: grayscale(100%); cursor: not-allowed; border-bottom-color: #e2e8f0; pointer-events: none; }
    
    /* ✨ ESFERAS DE CRISTAL 3D ✨ */
    @keyframes flotar-suave { 0% { transform: translateY(0) translateX(0) scale(1); } 33% { transform: translateY(-15px) translateX(10px) scale(1.02); } 66% { transform: translateY(10px) translateX(-10px) scale(0.98); } 100% { transform: translateY(0) translateX(0) scale(1); } }
    .burbuja-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%); box-shadow: inset -15px -15px 30px rgba(0, 0, 0, 0.15), inset 15px 15px 30px rgba(255, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
    .burbuja-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation: flotar-suave 8s infinite ease-in-out; }
    .burbuja-2 { width: 200px; height: 200px; bottom: -50px; right: 150px; animation: flotar-suave 12s infinite ease-in-out reverse; }
    .burbuja-3 { width: 150px; height: 150px; top: 50px; left: 15%; animation: flotar-suave 10s infinite ease-in-out 1s; }
</style>

<div class="row mb-5 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white shadow-sm" style="background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); border-radius: 24px; position: relative; overflow: hidden;">
            
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white mb-3 px-3 py-2 shadow-sm fw-bold" style="color: #6d28d9; letter-spacing: 1px; font-size: 0.85rem;">
                        <i class="bi bi-building me-1"></i> DIRECCIÓN Y SISTEMA
                    </span>
                    <h1 class="fw-bolder mb-2 text-white" style="font-size: 2.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Perfil de la Escuela</h1>
                    <p class="mb-0 fw-bold fs-5" style="color: rgba(255,255,255,0.9);">Configura la identidad oficial y filosofía de la institución.</p>
                </div>
                
                <div class="col-md-3 text-center text-md-end d-none d-md-block">
                    <img src="assets/img/logo.png" alt="Logo Escuela" style="max-height: 130px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row animate__animated animate__fadeInUp">
    <div class="col-12 col-xl-10 mx-auto">
        
        <div class="tarjeta-modulo p-4 p-md-5 bg-white shadow-sm mb-5 border-top border-5 border-primary" style="border-radius: 20px;">
            <h4 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-bank2 text-primary me-2"></i> Identidad Institucional</h4>
            
            <div class="row g-4">
                <div class="col-12">
                    <label class="fw-bold text-muted small mb-2">Nombre Oficial de la Institución <span class="text-danger">*</span></label>
                    <input type="text" id="pe-nombre" class="input-moderno form-control-lg fw-bold text-dark" placeholder="Ej: Unidad Educativa Libertador Bolívar">
                </div>
                <div class="col-md-6">
                    <label class="fw-bold text-muted small mb-2">Código DEA</label>
                    <input type="text" id="pe-dea" class="input-moderno text-uppercase" placeholder="Ej: S3255D1610">
                </div>
                <div class="col-md-6">
                    <label class="fw-bold text-muted small mb-2">Registro de Información Fiscal (RIF)</label>
                    <input type="text" id="pe-rif" class="input-moderno text-uppercase" placeholder="Ej: J-40401206-0">
                </div>
                <div class="col-12">
                    <label class="fw-bold text-muted small mb-2">Dirección Completa</label>
                    <textarea id="pe-direccion" class="form-control" rows="2" style="border-radius: 12px; border: 2px solid #e2e8f0;"></textarea>
                </div>
            </div>
        </div>

        <div class="tarjeta-modulo p-4 p-md-5 bg-white shadow-sm mb-5 border-top border-5 border-info" style="border-radius: 20px;">
            <h4 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-compass text-info me-2"></i> Filosofía de Gestión</h4>
            
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="fw-bold text-primary small mb-2"><i class="bi bi-rocket-takeoff-fill me-1"></i> Misión</label>
                    <textarea id="pe-mision" class="form-control" rows="4" style="border-radius: 12px; border: 2px solid #bfdbfe; background: #eff6ff;"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="fw-bold text-info small mb-2"><i class="bi bi-eye-fill me-1"></i> Visión</label>
                    <textarea id="pe-vision" class="form-control" rows="4" style="border-radius: 12px; border: 2px solid #a5f3fc; background: #ecfeff;"></textarea>
                </div>
                <div class="col-12">
                    <label class="fw-bold text-success small mb-2"><i class="bi bi-gem me-1"></i> Objetivo General / Valores</label>
                    <textarea id="pe-objetivo" class="form-control" rows="3" style="border-radius: 12px; border: 2px solid #bbf7d0; background: #f0fdf4;"></textarea>
                </div>
            </div>
        </div>

        <div class="tarjeta-modulo p-4 p-md-5 bg-white shadow-sm mb-5 border-top border-5 border-warning" style="border-radius: 20px;">
            <h4 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-journal-bookmark-fill text-warning me-2"></i> Proyecto Educativo (PEIC)</h4>
            <div class="row g-4">
                <div class="col-12">
                    <label class="fw-bold text-muted small mb-2">Nombre del Proyecto Educativo Integral Comunitario actual</label>
                    <textarea id="pe-peic" class="form-control" rows="2" style="border-radius: 12px; border: 2px solid #fde68a; background: #fffbeb;"></textarea>
                </div>
            </div>
        </div>

        <div class="text-end mb-5">
            <button class="btn-moderno btn-primario px-5 py-3 shadow-lg fs-5 w-100 w-md-auto d-inline-flex align-items-center justify-content-center" onclick="window.ModEscuela.guardarPerfil()">
                <i class="bi bi-save-fill me-2"></i> Guardar Cambios del Perfil
            </button>
        </div>

    </div>
</div>
